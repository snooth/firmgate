<dialog id="dlg-upload-summary" class="nc-modal nc-upload-summary-dialog" aria-labelledby="upload-summary-title">
  <div class="nc-modal-form">
    <h3 class="nc-modal-title" id="upload-summary-title">Upload complete</h3>
    <p class="nc-detail-muted nc-upload-summary-intro" id="upload-summary-intro"></p>
    <ul class="nc-upload-summary-stats" id="upload-summary-stats"></ul>
    <p class="nc-detail-hint nc-upload-summary-note" id="upload-summary-note" hidden></p>
    <div class="nc-modal-actions">
      <button type="button" class="nc-btn nc-btn-primary" id="upload-summary-close">Close</button>
    </div>
  </div>
</dialog>

{# Place at end of <main class="nc-crm2-main"> — overlay covers the main panel only (not sidebar). #}
<div id="crm-new-lead-drawer" class="nc-crm-new-lead-drawer" hidden>
  <div id="crm-new-lead-backdrop" class="nc-crm-new-lead-backdrop" aria-hidden="true"></div>
  <div class="nc-crm-new-lead-sheet" role="dialog" aria-modal="true" aria-labelledby="crm-new-lead-sheet-title">
    <div class="nc-crm-new-lead-top">
      <div id="crm-new-lead-sheet-title" class="nc-crm-new-lead-title">New lead</div>
      <button type="button" class="nc-viewer-close" id="crm-new-lead-close" aria-label="Close">×</button>
    </div>
    <iframe id="crm-new-lead-frame" class="nc-crm-new-lead-frame" title="New lead"></iframe>
  </div>
</div>
